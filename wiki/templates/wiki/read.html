
{% extends 'wiki/layout.html' %}

{% block body %}
    
            <p>{{ article.title_html|safe }}</p>
            <p>{{ article.content_html|safe }}</p>
            <p><small>Created at: {{ article.created_at }}</small></p>
            <p><small>Updated at: {{ article.updated_at }}</small></p>
            
        <div class="action-buttons">
            <a href="{% url 'edit' article.id %}" class="btn">Edit Article</a>


            <div class="delete-container">
                <form action="{% url 'delete' article.id %}" method="POST">
                    {% csrf_token %}

                    <div class="confirm-section">
                        <input type="checkbox" id="confirmDelete">
                        <label for="confirmDelete">
                            Are you sure you want to delete this article? This action cannot be undone.
                        </label>
                    </div>

                    <button type="submit" class="delete-btn" id="deleteButton" disabled>
                        Delete Article
                    </button>
                </form>
            </div>

        </div>

        <script>
            const checkbox = document.getElementById("confirmDelete");
            const deleteButton = document.getElementById("deleteButton");

            checkbox.addEventListener("change", function() {
                deleteButton.disabled = !this.checked;
            });
        </script>
        <p><a href="{% url 'home' %}">Back to Homepage</a></p>


{% endblock %}
