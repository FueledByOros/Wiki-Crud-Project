version: "3.8"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: wikijuice
      POSTGRES_USER: wikijuice_user
      POSTGRES_PASSWORD: password123
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  pgdata: